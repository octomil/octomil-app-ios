name: iOS CI & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [sdk-updated]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday at 06:00 UTC

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: OctomilApp
  XCODE_VERSION: "16.2"

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml', 'Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve SPM dependencies
        run: |
          rm -rf .spm-cache/checkouts/octomil-ios
          rm -f .spm-cache/workspace-state.json
          xcodebuild -resolvePackageDependencies \
            -project OctomilApp.xcodeproj \
            -scheme $SCHEME \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Install iOS platform
        run: |
          # Retry up to 3 times — runner connectivity to simulator service is flaky
          for i in 1 2 3; do
            xcodebuild -downloadPlatform iOS && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Build for iOS (device, unsigned)
        run: |
          xcodebuild build \
            -project OctomilApp.xcodeproj \
            -scheme $SCHEME \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

  publish-testflight:
    name: Publish to TestFlight
    runs-on: macos-15
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # --- Install Apple certificate and provisioning profile ---
      - name: Install signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          echo "$PROVISIONING_PROFILE" | base64 --decode > $RUNNER_TEMP/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/

      # --- Install App Store Connect API key ---
      - name: Install App Store Connect API key
        env:
          API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY_P8" | base64 --decode > ~/private_keys/AuthKey_${API_KEY_ID}.p8

      # --- Extract version from tag ---
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "build=$GITHUB_RUN_NUMBER" >> $GITHUB_OUTPUT

      - name: Resolve SPM dependencies
        run: |
          rm -rf .spm-cache/checkouts/octomil-ios
          rm -f .spm-cache/workspace-state.json
          xcodebuild -resolvePackageDependencies \
            -project OctomilApp.xcodeproj \
            -scheme $SCHEME \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Install iOS platform
        run: |
          for i in 1 2 3; do
            xcodebuild -downloadPlatform iOS && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      # --- Build archive ---
      - name: Build Release Archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
        run: |
          xcodebuild archive \
            -project OctomilApp.xcodeproj \
            -scheme $SCHEME \
            -archivePath $RUNNER_TEMP/OctomilApp.xcarchive \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            MARKETING_VERSION=$VERSION \
            CURRENT_PROJECT_VERSION=$BUILD

      # --- Export IPA ---
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/OctomilApp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPLE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPLE_API_KEY_ISSUER }}

      # --- Upload to TestFlight ---
      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/OctomilApp.ipa" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_KEY_ISSUER"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctomilApp-${{ steps.version.outputs.version }}.ipa
          path: ${{ runner.temp }}/export/OctomilApp.ipa

      # --- Cleanup ---
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12
          rm -f $RUNNER_TEMP/profile.mobileprovision
          rm -rf ~/private_keys
