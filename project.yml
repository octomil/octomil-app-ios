name: OctomilApp
options:
  bundleIdPrefix: ai.octomil
  deploymentTarget:
    iOS: "17.0"

packages:
  Octomil:
    url: https://github.com/octomil/octomil-ios.git
    version: 1.1.1

targets:
  OctomilApp:
    type: application
    platform: iOS
    sources:
      - OctomilApp
    dependencies:
      - package: Octomil
        product: Octomil
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.octomil.app
        CODE_SIGN_ENTITLEMENTS: OctomilApp/OctomilApp.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OctomilApp/Info.plist
        DEVELOPMENT_TEAM: 32MGT8HBSL
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "Octomil App Store"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
